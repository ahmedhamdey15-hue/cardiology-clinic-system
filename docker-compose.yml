version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped  # Added restart policy
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=postgresql://clinic_user:clinic_password@db:5432/clinic_db
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped  # Added restart policy
    environment:
      - POSTGRES_USER=clinic_user
      - POSTGRES_PASSWORD=clinic_password
      - POSTGRES_DB=clinic_db
    ports:
      - "5400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d clinic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
