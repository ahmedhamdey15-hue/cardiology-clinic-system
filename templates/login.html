<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - {{ settings.get('clinic_name', 'عيادة القلب') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="login-body">
    <button id="lang-toggle-btn" onclick="toggleLanguage()" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:rgba(30, 58, 138, 0.5); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:8px 16px; border-radius:30px; cursor:pointer; font-family:Tajawal, sans-serif; font-weight:bold; backdrop-filter:blur(5px); transition:0.3s;">English <i class="fa-solid fa-globe"></i></button>
    <div id="google_translate_element" style="display:none;"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="login-container">
        <div class="logo-circle" style="margin: 0 auto 20px; width: 80px; height: 80px;">
            <i class="fa-solid fa-stethoscope logo-icon" style="font-size: 2.5rem; color: #fff;"></i>
        </div>
        <h2 style="color: #fff; margin-bottom: 5px; line-height: 1.4;">
            {{ settings.get('clinic_name', 'عيادة القلب') }}
            {% if settings.get('doctor_name') %}
            <br><span style="font-size: 1.2rem; font-weight: 500; color: rgba(255,255,255,0.9);">{{ settings.get('doctor_name') }}</span>
            {% endif %}
        </h2>
        <p style="color: rgba(255,255,255,0.8); margin-bottom: 30px;">نظام إدارة العيادة</p>

        <form id="login-form">
            <div class="form-group" style="text-align: right;">
                <label>اسم المستخدم</label>
                <input type="text" id="username" required dir="ltr" style="text-align: left;">
            </div>
            <div class="form-group" style="text-align: right;">
                <label>كلمة المرور</label>
                <input type="password" id="password" required dir="ltr" style="text-align: left;">
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">الدخول للنظام</button>
        </form>

        <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; font-size: 0.85rem; color: rgba(255,255,255,0.6); text-align: center;">
            <p style="margin: 0;">الإصدار: V2.1.0</p>
            <p style="margin: 5px 0 0 0;">جميع حقوق البرنامج محفوظة لشركة <strong style="color: #fff;">Medprog</strong> &copy; 2026</p>
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'جاري التحقق...';

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    showToast(result.message);
                    setTimeout(() => {
                        window.location.href = result.redirect || '/';
                    }, 500);
                } else {
                    showToast(result.error || 'خطأ في تسجيل الدخول', 'error');
                    btn.disabled = false;
                    btn.textContent = 'الدخول للنظام';
                }
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر', 'error');
                btn.disabled = false;
                btn.textContent = 'الدخول للنظام';
            }
        });
    </script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
</body>

</html>
