<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة عيادة القلب</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

<body class="home-body">
    <div class="main-container">
        <header class="home-header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="text-align: right;">
                    <strong>مرحباً، <span id="current_user_name">...</span></strong>
                    <p style="margin:0; font-size: 0.85rem; color: var(--text-muted);">(<span
                            id="current_user_role">...</span>)</p>
                </div>
                <div>
                    <button id="dark-mode-toggle-btn" onclick="themeApp.toggleDarkMode()" class="btn btn-secondary"
                        style="padding: 8px 15px; font-size: 0.9rem; margin-left: 10px;">🌙 الوضع الليلي</button>
                    <a href="/logout" class="btn btn-danger" style="padding: 8px 15px; font-size: 0.9rem;">تسجيل
                        الخروج</a>
                </div>
            </div>

            <div class="logo-circle">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 0C1.46 6.7 1.33 10.28 4 13l8 8 8-8c2.67-2.72 2.54-6.3.42-8.42z">
                    </path>
                    <path d="M3.5 12h4l2 5 4-10 2 5h5"></path>
                </svg>
            </div>
            <h1>عيادة القلب التخصصية</h1>
            <p>نظام الإدارة المتكامل</p>
        </header>

        <div class="cards-container">
            <a href="/reception" class="dashboard-card card-reception" id="card-reception" style="display:none;">
                <div class="card-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <h2>شاشة الاستقبال</h2>
                <p>إدارة المرضى، الحجوزات، المواعيد والدور</p>
                <div class="card-arrow">←</div>
            </a>

            <a href="/assistant" class="dashboard-card card-assistant" id="card-assistant" style="display:none;">
                <div class="card-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                </div>
                <h2>شاشة المساعد</h2>
                <p>أخذ القياسات، التاريخ المرضي، رسم القلب والأدوية</p>
                <div class="card-arrow">←</div>
            </a>

            <a href="/doctor" class="dashboard-card card-doctor primary-card" id="card-doctor" style="display:none;">
                <div class="card-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h2>شاشة الطبيب</h2>
                <p>تشخيص المريض، الروشتة، ومتابعة التاريخ بالكامل</p>
                <div class="card-arrow">←</div>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/current_user');
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('current_user_name').textContent = user.name;
                    document.getElementById('current_user_role').textContent = user.role;

                    const role = user.role;
                    if (role === 'admin') {
                        document.getElementById('card-reception').style.display = 'block';
                        document.getElementById('card-assistant').style.display = 'block';
                        document.getElementById('card-doctor').style.display = 'block';
                    } else if (role === 'receptionist') {
                        document.getElementById('card-reception').style.display = 'block';
                    } else if (role === 'assistant') {
                        document.getElementById('card-assistant').style.display = 'block';
                    } else if (role === 'doctor') {
                        document.getElementById('card-doctor').style.display = 'block';
                    }
                }
            } catch (error) {
                console.error("Failed to fetch user");
            }
        });
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
