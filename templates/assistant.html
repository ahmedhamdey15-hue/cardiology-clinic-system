<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الطبيب المساعد - عيادة القلب</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <button id="lang-toggle-btn" onclick="toggleLanguage()" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:#1e40af; color:#fff; border:none; padding:10px 20px; border-radius:30px; cursor:pointer; font-family:Tajawal, sans-serif; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.2); transition:0.3s;">English 🌐</button>
<div id="google_translate_element" style="display:none;"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-layout">
        <aside class="sidebar">
            <h2><i class="icon">👨‍⚕️</i> شاشة المساعد</h2>
            <div style="margin-bottom: 15px;">
                <ul class="nav-links">
                    <li class="active"><a href="#" onclick="assistantApp.loadQueue()">🔄 تحديث القائمة</a></li>
                    <li><a href="#" onclick="themeApp.openSettings(); return false;"
                            style="color:var(--primary-color);">🎨 ألوان النظام</a></li>
                    <li><a href="#" id="dark-mode-toggle-btn" onclick="themeApp.toggleDarkMode(); return false;">🌙
                            الوضع الليلي</a></li>
                    <li><a href="/logout" style="color:var(--danger)">تسجيل الخروج</a></li>
                </ul>
            </div>
            <ul class="queue-list" id="assistant-queue" style="max-height: 60vh; overflow-y: auto;">
                <!-- Populate via app.js -->
            </ul>
            <div style="margin-top:auto">
                <a href="/"
                    style="color:var(--text-muted); text-decoration:none; display: block; margin-bottom: 5px;">العودة
                    للرئيسية</a>
                <a href="/logout" style="color:var(--danger); text-decoration:none;">تسجيل الخروج</a>
            </div>
        </aside>

        <main class="content-area">
            <div class="panel" id="no-patient-selected">
                <div style="text-align:center; padding: 50px; color: var(--text-muted);">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        style="margin-bottom:20px; color:#d1d5db;">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <h3>الرجاء اختيار مريض من القائمة الجانبية (حالة: في الانتظار أو مع المساعد)</h3>
                </div>
            </div>

            <div class="panel hidden" id="assistant-panel">
                <div class="header-action">
                    <h3>بيانات الزيارة: <span id="current_patient_name" style="color:var(--primary-color)"></span>
                        (<span id="current_file_number"></span>)</h3>
                    <span class="status-badge status-with-assistant">مع المساعد ⌛</span>
                </div>

                <form id="form-measurements">
                    <input type="hidden" id="current_visit_id">

                    <h4 style="color: var(--primary-color); margin-bottom: 15px;">القياسات الحيوية للزيارة</h4>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>قياس ضغط الدم (mmHg)</label>
                            <input type="text" id="m_blood_pressure" placeholder="مثال: 120/80">
                        </div>
                        <div class="form-group">
                            <label>قياس السكر (mg/dL)</label>
                            <input type="text" id="m_blood_sugar" placeholder="مثال: 95">
                        </div>
                        <div class="form-group full-width">
                            <label>نتيجة رسم القلب (ECG)</label>
                            <textarea id="m_ecg_result" rows="2"
                                placeholder="أدخل تفاصيل وملاحظات رسم القلب أو نتيجة طباعته..."></textarea>
                        </div>
                    </div>

                    <h4 style="color: var(--primary-color); margin: 25px 0 15px 0;">التاريخ الطبي للتحضير للطبيب</h4>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>الأمراض المزمنة للمريض (يتم حفظها في ملف المريض الدائم)</label>
                            <input type="text" id="p_chronic_diseases" placeholder="مثل: الضغط، السكر...">
                        </div>
                        <div class="form-group full-width">
                            <label>أدوية الأمراض المزمنة التي يتناولها بانتظام (لملف المريض الدائم)</label>
                            <textarea id="p_chronic_medications" rows="2"
                                placeholder="أدخل الأدوية المعتادة..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>أي أدوية أخرى مضافة مؤخراً لغير الأمراض المزمنة (للزيارة الحالية)</label>
                            <input type="text" id="m_other_medications" placeholder="المضادات الحيوية وغيرها...">
                        </div>
                        <div class="form-group full-width">
                            <label>ملاحظات عامة لطبيب العيادة</label>
                            <textarea id="m_assistant_notes" rows="2"
                                placeholder="أي شكوى أو ملاحظة هامة..."></textarea>
                        </div>
                    </div>

                    <div style="display:flex; gap:15px; margin-top: 20px;">
                        <button type="submit" class="btn">حفظ بيانات القياسات</button>
                        <button type="button" class="btn btn-secondary" id="btn-transfer-doctor"
                            onclick="assistantApp.transferToDoctor()">إتمام القياسات والتحويل للطبيب</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            assistantApp.init();
        });
    </script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
</body>

</html>
