<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - عيادة القلب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <button id="lang-toggle-btn" onclick="toggleLanguage()" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:#1e40af; color:#fff; border:none; padding:10px 20px; border-radius:30px; cursor:pointer; font-family:Tajawal, sans-serif; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.2); transition:0.3s;">English 🌐</button>
<div id="google_translate_element" style="display:none;"></div>

<div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-800">عيادة القلب والأوعية الدموية</h1>
        <p class="text-gray-500 mt-2">طلب حجز موعد كشف</p>
    </div>

    <form id="bookingForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">الاسم بالكامل</label>
            <input type="text" id="name" required pattern="^(\S+\s+){2,}\S+$" title="يجب أن يكون الاسم ثلاثياً على الأقل" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">رقم الهاتف (للتواصل عبر الواتساب)</label>
            <input type="tel" id="phone" required pattern="0[0-9]{10}" maxlength="11" title="يجب أن يتكون من 11 رقم ويبدأ بصفر" placeholder="مثال: 01012345678" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">التاريخ المفضل</label>
            <input type="date" id="desired_date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">الوقت المفضل (اختياري)</label>
            <input type="time" id="desired_time" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">سبب الزيارة (اختياري)</label>
            <textarea id="reason" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border"></textarea>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 font-bold transition">
            إرسال طلب الحجز
        </button>
    </form>

    <div id="message" class="hidden mt-4 p-4 rounded-md text-center"></div>
</div>

<script>
document.getElementById('bookingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = 'جاري الإرسال...';

    const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        desired_date: document.getElementById('desired_date').value,
        desired_time: document.getElementById('desired_time').value,
        reason: document.getElementById('reason').value
    };

    try {
        const res = await fetch('/api/booking', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        
        const msgDiv = document.getElementById('message');
        msgDiv.classList.remove('hidden');
        if(res.ok) {
            msgDiv.className = 'mt-4 p-4 rounded-md text-center bg-green-100 text-green-800';
            msgDiv.innerText = result.message;
            e.target.reset();
        } else {
            msgDiv.className = 'mt-4 p-4 rounded-md text-center bg-red-100 text-red-800';
            msgDiv.innerText = result.error || 'حدث خطأ، حاول مرة أخرى.';
        }
    } catch(err) {
        alert('فشل الاتصال بالخادم');
    } finally {
        btn.disabled = false;
        btn.innerText = 'إرسال طلب الحجز';
    }
});
</script>
    <script src="{{ url_for('static', filename='js/translate.js') }}"></script>
</body>
</html>
